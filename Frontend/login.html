<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/output.css" />
    <title>WalletFy - Login</title>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-cyan-50 font-nunito"
  >
    <!-- Header -->
    <header class="w-full flex px-4 py-6">
      <div
        class="flex items-center gap-2 px-6 py-3 bg-cyan-300 shadow-md rounded-full"
      >
        <p class="text-blue-500 font-bold">WALLET</p>
        <p class="text-white">FY</p>
      </div>
    </header>

    <!-- Main -->
    <main class="container mx-auto px-4 pb-8 flex items-center justify-center">
      <section
        class="w-full max-w-6xl bg-white rounded-[32px] shadow-2xl overflow-hidden grid lg:grid-cols-2"
      >
        <!-- Forms container -->
        <div class="relative" style="min-height: 620px">
          <!-- Register Form -->
          <div
            id="slideRegister"
            class="form-slide absolute inset-0 p-8 sm:p-10 lg:p-14 flex flex-col justify-center bg-white transition-all duration-500"
          >
            <h1
              class="text-3xl sm:text-4xl font-bold text-slate-800 leading-tight"
            >
              Crie sua conta
            </h1>
            <p class="text-slate-500 mt-3 mb-8">
              Organize entradas, saídas e investimentos em um único lugar.
            </p>

            <form class="space-y-5" id="registerForm">
              <div>
                <label
                  for="reg-name"
                  class="block text-sm font-semibold text-slate-700 mb-2"
                  >Nome Completo</label
                >
                <input
                  type="text"
                  id="reg-name"
                  placeholder="Digite seu nome"
                  class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div>
                <label
                  for="reg-email"
                  class="block text-sm font-semibold text-slate-700 mb-2"
                  >E-mail</label
                >
                <input
                  type="email"
                  id="reg-email"
                  placeholder="Digite seu e-mail"
                  class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div>
                <label
                  for="reg-senha"
                  class="block text-sm font-semibold text-slate-700 mb-2"
                  >Senha</label
                >
                <input
                  type="password"
                  id="reg-senha"
                  placeholder="Crie uma senha"
                  class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div>
                <label
                  for="reg-confirmar"
                  class="block text-sm font-semibold text-slate-700 mb-2"
                  >Confirmar senha</label
                >
                <input
                  type="password"
                  id="reg-confirmar"
                  placeholder="Confirme sua senha"
                  class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div
                id="registerMessage"
                class="hidden p-3 rounded-lg text-sm font-medium"
              ></div>

              <button
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 active:scale-[0.98] text-white font-semibold py-3 rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/20"
              >
                Criar Conta
              </button>
            </form>

            <p class="text-center text-slate-500 text-sm mt-6">
              Já possui uma conta?
              <a
                id="goLogin"
                href="#"
                class="text-blue-500 font-semibold hover:text-blue-600"
              >
                Faça login
              </a>
            </p>
          </div>

          <!-- Login Form -->
          <div
            id="slideLogin"
            class="form-slide absolute inset-0 p-8 sm:p-10 lg:p-14 flex flex-col justify-center bg-white transition-all duration-500 translate-x-full opacity-0 pointer-events-none"
          >
            <h1
              class="text-3xl sm:text-4xl font-bold text-slate-800 leading-tight"
            >
              Bem-vindo de volta
            </h1>
            <p class="text-slate-500 mt-3 mb-8">
              Entre para acessar sua carteira financeira.
            </p>

            <form class="space-y-5" id="loginForm">
              <div>
                <label
                  for="log-email"
                  class="block text-sm font-semibold text-slate-700 mb-2"
                  >E-mail</label
                >
                <input
                  type="email"
                  id="log-email"
                  placeholder="Digite seu e-mail"
                  class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div>
                <label
                  for="log-senha"
                  class="block text-sm font-semibold text-slate-700 mb-2"
                  >Senha</label
                >
                <input
                  type="password"
                  id="log-senha"
                  placeholder="Digite sua senha"
                  class="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div class="text-right">
                <a
                  href="#"
                  class="text-sm text-blue-500 font-semibold hover:text-blue-600"
                >
                  Esqueci minha senha
                </a>
              </div>

              <button
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 active:scale-[0.98] text-white font-semibold py-3 rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/20"
              >
                Entrar
              </button>
            </form>

            <p class="text-center text-slate-500 text-sm mt-6">
              Não tem uma conta?
              <a
                id="goRegister"
                href="#"
                class="text-blue-500 font-semibold hover:text-blue-600"
              >
                Cadastre-se
              </a>
            </p>
          </div>
        </div>

        <!-- Image panel -->
        <div
          class="hidden lg:flex items-center justify-center bg-gradient-to-br from-cyan-300 to-blue-400 p-8"
        >
          <img
            src="/src/assets/carteira.png"
            alt="WalletFy"
            class="w-full max-w-lg object-contain animate-float drop-shadow-2xl"
          />
        </div>
      </section>
    </main>

    <script type="module">
      import { cadastrarUsuario } from "./conexao.js";
      import { loginUsuario } from "./conexao.js";
      document.getElementById("goLogin").addEventListener("click", showLogin);
      document
        .getElementById("goRegister")
        .addEventListener("click", showRegister);
      const slideRegister = document.getElementById("slideRegister");
      const slideLogin = document.getElementById("slideLogin");

      const registerForm = document.getElementById("registerForm");

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const nome = document.getElementById("reg-name").value;
        const email = document.getElementById("reg-email").value;
        const senha = document.getElementById("reg-senha").value;
        const confirmar = document.getElementById("reg-confirmar").value;

        if (senha !== confirmar) {
          alert("As senhas não coincidem.");
          return;
        }

        try {
          const usuario = await cadastrarUsuario(nome, email, senha);

          console.log(usuario);

          alert("Usuário cadastrado com sucesso!");

          registerForm.reset();

          showLogin({
            preventDefault: () => {},
          });
        } catch (error) {
          alert(error.message);
        }
      });

      const loginForm = document.getElementById("loginForm");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("log-email").value;

        const senha = document.getElementById("log-senha").value;

        try {
          const resposta = await loginUsuario(email, senha);

          localStorage.setItem("usuario", JSON.stringify(resposta.user));

          alert("Login realizado com sucesso!");

          window.location.href = "index.html";
        } catch (error) {
          alert(error.message);
        }
      });

      function showLogin(e) {
        e.preventDefault();
        slideRegister.classList.add(
          "-translate-x-full",
          "opacity-0",
          "pointer-events-none",
        );
        slideRegister.classList.remove("translate-x-0");

        slideLogin.classList.remove(
          "translate-x-full",
          "opacity-0",
          "pointer-events-none",
        );
        slideLogin.classList.add("translate-x-0");
      }

      function showRegister(e) {
        e.preventDefault();
        slideLogin.classList.add(
          "translate-x-full",
          "opacity-0",
          "pointer-events-none",
        );
        slideLogin.classList.remove("translate-x-0");

        slideRegister.classList.remove(
          "-translate-x-full",
          "opacity-0",
          "pointer-events-none",
        );
        slideRegister.classList.add("translate-x-0");
      }

      document.getElementById("goLogin").addEventListener("click", showLogin);
      document
        .getElementById("goRegister")
        .addEventListener("click", showRegister);
    </script>
  </body>
</html>
